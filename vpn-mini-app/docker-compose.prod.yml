# Продакшен: Mini App за Caddy с автоматическим SSL.
# Запуск: docker compose -f docker-compose.prod.yml up -d --build

services:
  mini-app:
    build: .
    restart: unless-stopped
    expose:
      - "80"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - mini-app

volumes:
  caddy_data:
  caddy_config:
