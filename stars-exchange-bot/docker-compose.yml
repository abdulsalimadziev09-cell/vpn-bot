services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: starsbot
      POSTGRES_PASSWORD: starsbot
      POSTGRES_DB: starsbot
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U starsbot -d starsbot"]
      interval: 5s
      timeout: 5s
      retries: 5

  bot:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://starsbot:starsbot@postgres:5432/starsbot
    ports:
      - "8081:8081"
    volumes:
      - telethon_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  telethon_data:
