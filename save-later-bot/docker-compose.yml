services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: savebot
      POSTGRES_PASSWORD: savebot
      POSTGRES_DB: savebot
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U savebot -d savebot"]
      interval: 5s
      timeout: 5s
      retries: 5

  bot:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://savebot:savebot@postgres:5432/savebot
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
